<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GitHub图床</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .btn { background: #24292e; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px 0; }
        .btn:hover { background: #444d56; }
        .btn:disabled { background: #6c757d; cursor: not-allowed; }
        .status { margin: 20px 0; padding: 15px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .upload-area { border: 3px dashed #ddd; padding: 40px; text-align: center; margin: 20px 0; border-radius: 10px; cursor: pointer; }
        .upload-area:hover { border-color: #0366d6; }
        .preview { max-width: 100%; max-height: 300px; margin-top: 20px; display: none; }
        .logged-in { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 GitHub图床上传</h1>
        
        <!-- 登录前 -->
        <div id="loginSection">
            <p>使用GitHub账号登录以上传图片</p>
            <button class="btn" onclick="loginWithGitHub()" id="loginBtn">使用GitHub登录</button>
        </div>
        
        <!-- 登录后 -->
        <div id="uploadSection" style="display: none;">
            <p>欢迎，<span id="userName"></span>！</p>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                点击或拖放图片到此区域<br>
                <small>支持JPG、PNG、GIF，最大5MB</small>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            
            <img id="preview" class="preview" alt="预览">
            
            <div id="status" class="status"></div>
            
            <button class="btn" onclick="uploadImage()" id="uploadBtn" disabled>上传图片</button>
            <button class="btn" onclick="logout()" style="background: #dc3545;">退出登录</button>
        </div>
    </div>

    <script>
        // 配置
        const GITHUB_CLIENT_ID = 'Ov23li8KfRUkSZ7pPhug';
        const REDIRECT_URI = 'https://www.globalvillage.xn--xhq521b/img';
        const BACKEND_URL = 'https://img-back-roan.vercel.app';
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载，检查登录状态...');
            
            // 检查URL是否有code参数
            handleAuthCallback();
            
            // 检查本地存储的token
            checkLoginStatus();
            
            // 文件选择事件
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
            
            // 拖放功能
            setupDragAndDrop();
        });
        
        // 处理GitHub OAuth回调
        async function handleAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                console.log('发现授权码:', code);
                showStatus('正在验证授权...', 'info');
                
                try {
                    // 移除URL中的code参数
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    // 调用后端API获取access token
                    const response = await fetch(`${BACKEND_URL}/api/auth`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            code: code,
                            redirect_uri: REDIRECT_URI
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.access_token) {
                        // 保存token
                        localStorage.setItem('github_token', data.access_token);
                        showStatus('登录成功！', 'success');
                        
                        // 获取用户信息
                        await fetchUserInfo(data.access_token);
                    } else {
                        showStatus('登录失败: ' + (data.error || '未知错误'), 'error');
                        localStorage.removeItem('github_token');
                        localStorage.removeItem('github_user');
                    }
                    
                } catch (error) {
                    console.error('登录错误:', error);
                    showStatus('登录失败: ' + error.message, 'error');
                }
            }
        }
        
        // 检查登录状态
        async function checkLoginStatus() {
            const token = localStorage.getItem('github_token');
            const user = localStorage.getItem('github_user');
            
            if (token && user) {
                try {
                    // 验证token是否有效
                    const response = await fetch('https://api.github.com/user', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        const userData = JSON.parse(user);
                        showLoggedInState(userData.login);
                    } else {
                        // Token无效，清除
                        localStorage.removeItem('github_token');
                        localStorage.removeItem('github_user');
                        showLoggedOutState();
                    }
                } catch (error) {
                    console.error('Token验证失败:', error);
                    localStorage.removeItem('github_token');
                    localStorage.removeItem('github_user');
                    showLoggedOutState();
                }
            } else {
                showLoggedOutState();
            }
        }
        
        // 获取用户信息
        async function fetchUserInfo(token) {
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    localStorage.setItem('github_user', JSON.stringify(userData));
                    showLoggedInState(userData.login);
                } else {
                    throw new Error('获取用户信息失败');
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
                showStatus('获取用户信息失败', 'error');
            }
        }
        
        // GitHub OAuth登录
        function loginWithGitHub() {
            const scope = 'public_repo';
            const authUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${scope}`;
            console.log('重定向到:', authUrl);
            window.location.href = authUrl;
        }
        
        // 显示登录状态
        function showLoggedInState(username) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('userName').textContent = username;
            console.log('用户已登录:', username);
        }
        
        function showLoggedOutState() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('uploadSection').style.display = 'none';
            console.log('用户未登录');
        }
        
        // 处理文件选择
        let selectedFile = null;
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showStatus('请选择图片文件（JPG、PNG、GIF）', 'error');
                return;
            }
            
            // 验证文件大小（5MB）
            if (file.size > 5 * 1024 * 1024) {
                showStatus('图片大小不能超过5MB', 'error');
                return;
            }
            
            selectedFile = file;
            
            // 显示预览
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('uploadBtn').disabled = false;
            };
            reader.readAsDataURL(file);
            
            showStatus('已选择文件: ' + file.name, 'info');
        }
        
        // 设置拖放
        function setupDragAndDrop() {
            const dropArea = document.querySelector('.upload-area');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                dropArea.style.borderColor = '#0366d6';
                dropArea.style.backgroundColor = '#f6f8fa';
            }
            
            function unhighlight() {
                dropArea.style.borderColor = '#ddd';
                dropArea.style.backgroundColor = '';
            }
            
            dropArea.addEventListener('drop', function(e) {
                const dt = e.dataTransfer;
                const file = dt.files[0];
                
                if (file) {
                    const event = { target: { files: [file] } };
                    handleFileSelect(event);
                }
            }, false);
        }
        
        // 上传图片
        async function uploadImage() {
            if (!selectedFile) {
                showStatus('请先选择图片', 'error');
                return;
            }
            
            const token = localStorage.getItem('github_token');
            if (!token) {
                showStatus('请先登录', 'error');
                return;
            }
            
            const uploadBtn = document.getElementById('uploadBtn');
            const originalText = uploadBtn.textContent;
            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            
            showStatus('正在上传图片...', 'info');
            
            try {
                // 读取文件为Base64
                const reader = new FileReader();
                reader.readAsDataURL(selectedFile);
                
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    // 生成文件名
                    const timestamp = Date.now();
                    const random = Math.random().toString(36).substring(2, 8);
                    const extension = selectedFile.name.split('.').pop().toLowerCase() || 'jpg';
                    const filename = `image_${timestamp}_${random}.${extension}`;
                    
                    // 调用上传API
                    const response = await fetch(`${BACKEND_URL}/api/upload`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            token: token,
                            filename: filename,
                            content: base64Data,
                            message: `Upload ${filename}`,
                            branch: 'main'
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        const imageUrl = data.url || `https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/images/${filename}`;
                        const markdown = `![${filename}](${imageUrl})`;
                        
                        showStatus(`
                            <strong>✅ 上传成功！</strong><br><br>
                            <strong>图片链接：</strong><br>
                            <input type="text" value="${imageUrl}" style="width: 100%; padding: 5px; margin: 5px 0;" readonly><br>
                            <button onclick="copyToClipboard('${imageUrl}')" style="padding: 5px 10px; margin: 5px 0;">复制链接</button><br><br>
                            <strong>Markdown：</strong><br>
                            <input type="text" value="${markdown}" style="width: 100%; padding: 5px; margin: 5px 0;" readonly><br>
                            <button onclick="copyToClipboard('${markdown}')" style="padding: 5px 10px;">复制Markdown</button>
                        `, 'success');
                        
                        // 重置预览
                        selectedFile = null;
                        document.getElementById('preview').style.display = 'none';
                        document.getElementById('fileInput').value = '';
                        
                    } else {
                        showStatus('上传失败: ' + (data.error || data.message || '未知错误'), 'error');
                    }
                    
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = originalText;
                };
                
            } catch (error) {
                console.error('上传错误:', error);
                showStatus('上传失败: ' + error.message, 'error');
                uploadBtn.disabled = false;
                uploadBtn.textContent = originalText;
            }
        }
        
        // 复制到剪贴板
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showStatus('已复制到剪贴板', 'success');
            });
        }
        
        // 显示状态信息
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            
            // 如果是错误信息，5秒后自动隐藏
            if (type === 'error') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('github_token');
            localStorage.removeItem('github_user');
            showLoggedOutState();
            showStatus('已退出登录', 'info');
        }
    </script>
</body>
</html>
